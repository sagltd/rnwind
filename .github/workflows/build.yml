name: Build

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: rollup → lib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify artefacts
        run: |
          test -d packages/rnwind/lib/esm
          test -d packages/rnwind/lib/cjs
          test -f packages/rnwind/lib/esm/runtime/index.mjs
          test -f packages/rnwind/lib/cjs/runtime/index.cjs
          test -f packages/rnwind/lib/esm/metro/index.mjs
          test -f packages/rnwind/lib/esm/testing/index.mjs
